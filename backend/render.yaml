services:
  # Node.js Backend — API + Auth + Database
  - type: web
    name: automodel-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false   # Set this manually in Render dashboard
      - key: JWT_SECRET
        sync: false   # Set this manually in Render dashboard
      - key: GEMINI_API_KEY
        sync: false   # Set this manually in Render dashboard
      - key: GEMINI_API_KEY_2
        sync: false   # Set this manually in Render dashboard
      - key: RAZORPAY_KEY_ID
        sync: false   # Set this manually in Render dashboard
      - key: RAZORPAY_KEY_SECRET
        sync: false   # Set this manually in Render dashboard
